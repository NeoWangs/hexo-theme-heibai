hero:
  since: 'SINCE 2011 — “三人行必有我师焉” — HELLO WORLD'
  title_line1: "MR."
  title_line2_prefix: "DRIVE"
  title_line2_suffix: "FAR"
  title_cn: 开过头先生
  subtitle: 写代码，也读诗
  motto: 知其白，守其黑，为天下式
  poem:
    lines: 莫听穿林打叶声，何妨吟啸且徐行。竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。
    author: 苏轼 · 定风波

about:
  title_line1: HELLO
  title_line2: WORLD
  text:
    - 开过头先生，Mr.Drive2Far。
    - 白日写代码，闲时读诗书。
    - 信「三人行必有我师焉」，
    - 亦信「知其白，守其黑」。
  poem:
    lines: 君不见高堂明镜悲白发，朝如青丝暮成雪。
    author: 李白 · 将进酒

article_aside: 天行有常，不为尧存，不为桀亡

